<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诊断检查</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .box { background: white; padding: 20px; margin: 10px 0; border-radius: 10px; }
        button { padding: 15px 30px; font-size: 16px; margin: 5px; background: #3377FF; color: white; border: none; border-radius: 8px; }
        #output { background: #000; color: #0f0; padding: 15px; font-family: monospace; min-height: 300px; white-space: pre-wrap; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🔍 诊断工具</h1>
    
    <div class="box">
        <button onclick="checkVersion()">检查版本</button>
        <button onclick="checkUsers()">查看用户</button>
        <button onclick="createUser()">创建用户</button>
        <button onclick="clearData()">清除数据</button>
    </div>
    
    <div class="box">
        <div id="output">等待操作...</div>
    </div>
    
    <script>
        function log(msg) {
            document.getElementById('output').textContent += msg + '\n';
        }
        
        function checkVersion() {
            document.getElementById('output').textContent = '';
            log('=== 版本检查 ===');
            log('页面标题: ' + document.title);
            log('当前URL: ' + window.location.href);
            log('时间: ' + new Date().toLocaleString());
        }
        
        function checkUsers() {
            document.getElementById('output').textContent = '';
            log('=== 用户列表 ===');
            try {
                const dataStr = localStorage.getItem('cognitive_training_v49');
                if (!dataStr) {
                    log('❌ 没有数据');
                    log('请点击"创建用户"');
                    return;
                }
                
                const data = JSON.parse(dataStr);
                log('用户数: ' + data.users.length);
                log('当前用户ID: ' + data.currentUser);
                log('');
                
                data.users.forEach((u, i) => {
                    const isCurrent = u.id === data.currentUser;
                    log((i+1) + '. ' + u.name + (isCurrent ? ' [当前]' : ''));
                    log('   年级: ' + u.grade + ', 难度: Lv.' + u.difficulty);
                    log('   积分: ' + u.points);
                    log('   ID: ' + u.id);
                });
            } catch(e) {
                log('❌ 错误: ' + e.message);
            }
        }
        
        function createUser() {
            document.getElementById('output').textContent = '';
            log('=== 创建用户 ===');
            
            const name = prompt('请输入用户名:', '测试用户');
            if (!name) return;
            
            try {
                let dataStr = localStorage.getItem('cognitive_training_v49');
                let data = dataStr ? JSON.parse(dataStr) : {users: [], currentUser: null};
                
                const user = {
                    id: 'user_' + Date.now(),
                    name: name,
                    grade: 7,
                    difficulty: 1,
                    points: 1000,
                    stats: { totalQuestions: 0, correctAnswers: 0, totalMinutes: 0, streakDays: 0 },
                    wrongNotes: [],
                    completedTopics: []
                };
                
                data.users.push(user);
                data.currentUser = user.id;
                
                localStorage.setItem('cognitive_training_v49', JSON.stringify(data));
                log('✅ 创建成功: ' + name);
                log('总用户数: ' + data.users.length);
                log('');
                log('请刷新主页面查看');
            } catch(e) {
                log('❌ 错误: ' + e.message);
            }
        }
        
        function clearData() {
            if (confirm('确定清除所有数据？')) {
                localStorage.removeItem('cognitive_training_v49');
                document.getElementById('output').textContent = '✅ 已清除\n请刷新主页面';
            }
        }
        
        // 自动检查
        checkVersion();
    </script>
</body>
</html>
