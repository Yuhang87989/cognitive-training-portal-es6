<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>清除数据</title>
<style>
body{font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);color:white;text-align:center;padding:20px}
.box{background:rgba(255,255,255,0.1);border-radius:20px;padding:40px;max-width:300px}
h1{font-size:24px;margin-bottom:20px}
p{font-size:14px;opacity:0.9;margin-bottom:30px}
button{background:white;color:#667eea;border:none;padding:16px 32px;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;width:100%}
</style>
</head>
<body>
<div class="box">
<h1>🔄 数据重置</h1>
<p>点击下方按钮清除旧数据并重新开始</p>
<button onclick="reset()">清除数据</button>
</div>
<script>
function reset() {
    // 清除所有相关数据
    localStorage.removeItem('cognitive_training_users');
    localStorage.removeItem('cognitive_training_current_user');
    localStorage.removeItem('cognitive_training_v49');
    localStorage.removeItem('cognitive_training_v43');
    localStorage.removeItem('cognitive_training_v42');
    localStorage.removeItem('cognitive_training_v41');
    localStorage.removeItem('cognitive_training_v40');
    localStorage.removeItem('cognitive_training_v33');
    localStorage.removeItem('cognitive_training_v32');
    
    alert('数据已清除！即将跳转到主页...');
    
    setTimeout(function() {
        window.location.href = 'index.html';
    }, 500);
}
</script>
</body>
</html>
