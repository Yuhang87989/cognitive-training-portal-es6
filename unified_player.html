<!-- 统一媒体播放器 -->
<div id="media-player" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#1a1a2e,#16213e);z-index:1500;display:none;flex-direction:column;">
    <!-- 顶部导航 -->
    <div style="padding:16px;display:flex;align-items:center;justify-content:space-between;">
        <button onclick="closeMediaPlayer()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;">←</button>
        <span id="mp-type-label" style="color:white;font-size:16px;font-weight:bold;">🎧 音频课程</span>
        <div style="width:30px;"></div>
    </div>
    
    <!-- 媒体区域：音频显示封面，视频显示画面 -->
    <div id="mp-media-area" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;">
        <!-- 音频封面 -->
        <div id="mp-audio-cover" style="width:200px;height:200px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:80px;margin-bottom:24px;background:linear-gradient(135deg,#667eea,#764ba2);">
            🎧
        </div>
        <!-- 视频画面 -->
        <video id="mp-video-element" style="width:100%;max-height:60vh;display:none;" autoplay playsinline></video>
    </div>
    
    <!-- 课程信息 -->
    <div style="padding:0 20px;text-align:center;">
        <div id="mp-title" style="color:white;font-size:20px;font-weight:bold;margin-bottom:8px;"></div>
        <div id="mp-teacher" style="color:rgba(255,255,255,0.7);font-size:14px;"></div>
    </div>
    
    <!-- 进度条 -->
    <div style="padding:20px;">
        <div id="mp-progress-bar" style="height:4px;background:rgba(255,255,255,0.2);border-radius:2px;cursor:pointer;" onclick="seekMediaPlayer(event)">
            <div id="mp-progress-fill" style="height:100%;background:var(--blue);border-radius:2px;width:0%;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;">
            <span id="mp-current-time" style="color:rgba(255,255,255,0.7);font-size:12px;">0:00</span>
            <span id="mp-total-time" style="color:rgba(255,255,255,0.7);font-size:12px;">0:00</span>
        </div>
    </div>
    
    <!-- 控制按钮 -->
    <div style="padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:32px;">
        <button onclick="playPrevMedia()" style="background:none;border:none;color:white;font-size:28px;cursor:pointer;">⏮</button>
        <button id="mp-play-btn" onclick="toggleMediaPlay()" style="width:64px;height:64px;border-radius:50%;background:var(--blue);border:none;color:white;font-size:28px;cursor:pointer;">▶</button>
        <button onclick="playNextMedia()" style="background:none;border:none;color:white;font-size:28px;cursor:pointer;">⏭</button>
    </div>
    
    <!-- 速度和音量 -->
    <div style="padding:10px 20px 30px;display:flex;justify-content:center;gap:16px;">
        <button id="mp-speed-btn" onclick="cyclePlaybackSpeed()" style="background:rgba(255,255,255,0.1);border:none;color:white;padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;">1x</button>
        <button onclick="toggleMediaMute()" style="background:rgba(255,255,255,0.1);border:none;color:white;padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;">🔊</button>
    </div>
</div>

<!-- 隐藏的音频元素 -->
<audio id="mp-audio-element" style="display:none;"></audio>
