<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .box { background: white; padding: 20px; margin: 10px 0; border-radius: 10px; }
        button { padding: 15px 30px; font-size: 16px; margin: 5px; background: #3377FF; color: white; border: none; border-radius: 8px; }
        #output { background: #000; color: #0f0; padding: 15px; font-family: monospace; min-height: 200px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🔍 认知训练诊断工具</h1>
    
    <div class="box">
        <button onclick="check()">1️⃣ 检查数据</button>
        <button onclick="create()">2️⃣ 创建用户</button>
        <button onclick="clearAll()">3️⃣ 清除数据</button>
    </div>
    
    <div class="box">
        <div id="output">等待操作...</div>
    </div>
    
    <script>
        const out = document.getElementById('output');
        
        function log(msg) {
            out.textContent += msg + '\n';
        }
        
        function check() {
            out.textContent = '=== 检查数据 ===\n';
            try {
                const dataStr = localStorage.getItem('cognitive_training_v49');
                if (!dataStr) {
                    log('❌ 没有数据');
                    log('请点击"创建用户"按钮');
                    return;
                }
                
                const data = JSON.parse(dataStr);
                log('✅ 找到数据');
                log('用户数量: ' + data.users.length);
                log('当前用户: ' + data.currentUser);
                log('');
                log('用户列表:');
                data.users.forEach((u, i) => {
                    log((i+1) + '. ' + u.name);
                });
            } catch(e) {
                log('❌ 错误: ' + e.message);
            }
        }
        
        function create() {
            out.textContent = '=== 创建用户 ===\n';
            try {
                let dataStr = localStorage.getItem('cognitive_training_v49');
                let data = dataStr ? JSON.parse(dataStr) : {users: [], currentUser: null};
                
                const user = {
                    id: 'user_' + Date.now(),
                    name: '用户' + (data.users.length + 1),
                    grade: 7,
                    difficulty: 1,
                    points: 1000
                };
                
                data.users.push(user);
                data.currentUser = user.id;
                
                localStorage.setItem('cognitive_training_v49', JSON.stringify(data));
                log('✅ 创建成功: ' + user.name);
                log('用户总数: ' + data.users.length);
            } catch(e) {
                log('❌ 错误: ' + e.message);
            }
        }
        
        function clearAll() {
            if (confirm('确定清除所有数据？')) {
                localStorage.removeItem('cognitive_training_v49');
                out.textContent = '✅ 已清除所有数据\n请点击"创建用户"重新开始';
            }
        }
        
        // 自动检查
        check();
    </script>
</body>
</html>
